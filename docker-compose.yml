services:
  rabbit1:
    image: rabbitmq:3-management
    container_name: rabbit1
    environment:
      RABBITMQ_DEFAULT_USER: wso2mi
      RABBITMQ_DEFAULT_PASS: wso2pass
    ports:
      - "5672:5672"     # RabbitMQ AMQP port
      - "15672:15672"   # Management UI port
    networks:
      - rabbitmq-net

  rabbit2:
    image: rabbitmq:3-management
    container_name: rabbit2
    environment:
      RABBITMQ_DEFAULT_USER: wso2mi
      RABBITMQ_DEFAULT_PASS: wso2pass
    ports:
      - "5673:5672"     # maps host 5673 to container 5672 (alternative AMQP port)
      - "15673:15672"   # management UI alternative port
    networks:
      - rabbitmq-net

  nginx:
    image: nginx:latest
    container_name: nginx-rmq-failover
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5679:5679"     # NGINX load balancer port for AMQP traffic
      - "15679:15679"   # NGINX reverse proxy port for management UI/API
    depends_on:
      - rabbit1
      - rabbit2
    networks:
      - rabbitmq-net

networks:
  rabbitmq-net:
    driver: bridge